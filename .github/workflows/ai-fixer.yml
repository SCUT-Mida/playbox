name: 🛠️ AI Code Fixer

on:
  issue_comment:
    types: [created]

jobs:
  fix:
    # 仅在 PR 评论中包含 /claude-fix 时触发
    if: contains(github.event.comment.body, '/claude-fix') && github.event.issue.pull_request
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write

    steps:
      - name: 📥 Get PR Branch Info
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        id: pr_data
        run: |
          PR_DATA=$(gh pr view ${{ github.event.issue.number }} --json headRefName --jq '.headRefName')
          echo "branch=$PR_DATA" >> $GITHUB_OUTPUT

      - name: 📥 Checkout PR Branch
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.pr_data.outputs.branch }}
          fetch-depth: 0

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: '24'

      - name: 📝 Generate Prompt via Local Script
        env:
          # 将触发评论的内容暴露为环境变量，供脚本读取
          COMMENT_BODY: ${{ github.event.comment.body }}
        run: |
          TASK_DIR=".ai-tasks/issue-${{ github.event.issue.number }}"
          
          # 👇【核心逻辑：计算当前修复轮次】
          EXISTING_FIXES=$(ls -1 "$TASK_DIR"/ai-fixer-prompt_r*.md 2>/dev/null | wc -l)
          CURRENT_ROUND=$((EXISTING_FIXES + 1))
          
          # 将轮次写入 GITHUB_ENV
          echo "CURRENT_ROUND=$CURRENT_ROUND" >> $GITHUB_ENV
          
          echo "检测到当前是第 $CURRENT_ROUND 轮修复"
          
          # 执行本地脚本 (传入：目录, 角色, 轮次)
          chmod +x ./.ai-tasks/scripts/generate-ai-task.sh
          ./.ai-tasks/scripts/generate-ai-task.sh "$TASK_DIR" "fixer" "$CURRENT_ROUND"

      - name: 🤖 Execute Claude Code Agent (Fixer)
        env:
          # ===================================================
          "ANTHROPIC_BASE_URL": "https://open.bigmodel.cn/api/anthropic"
          "ANTHROPIC_DEFAULT_HAIKU_MODEL": "glm-4.7"
          "ANTHROPIC_DEFAULT_SONNET_MODEL": "glm-5.2[1m]"
          "ANTHROPIC_DEFAULT_OPUS_MODEL": "glm-5.2[1m]"
          "CLAUDE_CODE_AUTO_COMPACT_WINDOW": "1000000"
          "CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC": 1
          "API_TIMEOUT_MS": "3000000"
          ANTHROPIC_AUTH_TOKEN: ${{ secrets.GLM_API_KEY }}
          # ===================================================
          TASK_DIR: .ai-tasks/issue-${{ github.event.issue.number }}
          ROUND: ${{ env.CURRENT_ROUND }}
        run: |
          npm install -g @anthropic-ai/claude-code
          
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 动态拼接 Prompt 文件名
          PROMPT_FILE="$TASK_DIR/ai-fixer-prompt_r${ROUND}.md"
          
          echo "正在读取 $PROMPT_FILE 并执行代码修复..."
          claude -p "$(cat $PROMPT_FILE)" --dangerously-skip-permissions

      - name: 🚀 Push Fix Code
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ROUND: ${{ env.CURRENT_ROUND }}
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "⚠️ 警告: AI 没有修改任何代码文件！"
          else
            echo "✅ 发现代码修改，准备提交第 ${ROUND} 轮修复"
            # 同时提交代码修改和记录的 Prompt 历史文件
            git add .
            git commit -m "🛠️ fix: 根据审查员意见完成第 ${ROUND} 轮代码重构"
            git push
          fi