name: 🕵️ AI Code Reviewer

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    # 仅限 AI 创建的分支触发
    if: startsWith(github.head_ref, 'ai-fix/issue-')
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      # 删掉了 contents: write，彻底禁止它提交代码

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: '24'

      - name: 📝 Generate Prompt via Local Script
        env:
          HEAD_REF: ${{ github.head_ref }}
        run: |
          ISSUE_NUMBER=$(echo "$HEAD_REF" | grep -oiE 'issue-[0-9]+' | grep -oiE '[0-9]+' | head -n 1)
          if [ -z "$ISSUE_NUMBER" ]; then ISSUE_NUMBER=${{ github.event.pull_request.number }}; fi
          
          TASK_DIR=".ai-tasks/issue-${ISSUE_NUMBER}"
          echo "TASK_DIR=$TASK_DIR" >> $GITHUB_ENV
          
          EXISTING_REVIEWS=$(ls -1 "$TASK_DIR"/review_result_r*.md 2>/dev/null | wc -l)
          CURRENT_ROUND=$((EXISTING_REVIEWS + 1))
          echo "CURRENT_ROUND=$CURRENT_ROUND" >> $GITHUB_ENV
          
          echo "检测到当前是 Issue #$ISSUE_NUMBER 的第 $CURRENT_ROUND 轮审查"
          
          chmod +x ./.ai-tasks/scripts/generate-ai-task.sh
          ./.ai-tasks/scripts/generate-ai-task.sh "$TASK_DIR" "reviewer" "$CURRENT_ROUND"

      - name: 🤖 Execute Claude Code Agent (Reviewer)
        env:
          "ANTHROPIC_BASE_URL": "https://open.bigmodel.cn/api/anthropic"
          "ANTHROPIC_DEFAULT_HAIKU_MODEL": "glm-4.7"
          "ANTHROPIC_DEFAULT_SONNET_MODEL": "glm-5.2[1m]"
          "ANTHROPIC_DEFAULT_OPUS_MODEL": "glm-5.2[1m]"
          "CLAUDE_CODE_AUTO_COMPACT_WINDOW": "1000000"
          "CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC": 1
          "API_TIMEOUT_MS": "3000000"
          ANTHROPIC_AUTH_TOKEN: ${{ secrets.GLM_API_KEY }}
          TASK_DIR: ${{ env.TASK_DIR }}
          ROUND: ${{ env.CURRENT_ROUND }}
        run: |
          npm install -g @anthropic-ai/claude-code
          
          PROMPT_FILE="$TASK_DIR/ai-reviewer-prompt_r${ROUND}.md"
          OUTPUT_FILE="$TASK_DIR/review_result_r${ROUND}.md"
          
          echo "正在读取 $PROMPT_FILE 并执行审查..."
          claude -p "$(cat $PROMPT_FILE)" --dangerously-skip-permissions > "$OUTPUT_FILE"

      - name: ⚙️ Parse Review & Action
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          TASK_DIR: ${{ env.TASK_DIR }}
          ROUND: ${{ env.CURRENT_ROUND }}
        run: |
          RESULT_FILE="$TASK_DIR/review_result_r${ROUND}.md"

          DECISION=$(grep "^DECISION:" "$RESULT_FILE" | awk '{print $2}')
          # 提取 COMMENT，并去掉文本中可能破坏 shell 的特殊字符
          COMMENT=$(sed -n '/^COMMENT:/,$p' "$RESULT_FILE" | sed 's/^COMMENT://' | tr -d '\r')

          if [ "$DECISION" = "APPROVE" ]; then
            echo "✅ 代码审查通过，批准合并..."
            # 批准合并
            gh pr review $PR_NUMBER --approve --body "🕵️ AI 审查通过！代码质量优秀。\n\n$COMMENT"
          else
            echo "❌ 代码审查不通过，触发 AI-Fixer..."
            # 👇【关键修复】：在评论正文开头强制加入 /claude-fix 指令前缀！
            gh pr comment $PR_NUMBER --body "/claude-fix 🛠️ **请立即根据以下审查意见修改代码：** \n\n> 以下是第 $ROUND 轮审查未通过的意见：\n\n$COMMENT"
          fi