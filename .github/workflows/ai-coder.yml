name: 🤖 AI Coder

on:
  issues:
    types: [labeled]

jobs:
  run-claude:
    if: github.event.label.name == 'ai-task'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: '24'

      - name: 💡 Comment on Issue
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🚀 **Claude Code 已接管任务**！\n\n开始分析Issue并准备实现代码，请耐心等候...`
            });

      - name: 📝 Generate Prompt via Local Script
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          # 赋予脚本执行权限并调用
          chmod +x ./scripts/generate-ai-task.sh
          ./scripts/generate-ai-task.sh ".ai-tasks/issue-${{ github.event.issue.number }}" "coder"

      - name: 🛠️ Execute Claude Code Agent
        env:
          # ===================================================
          "ANTHROPIC_BASE_URL": "https://open.bigmodel.cn/api/anthropic"
          "ANTHROPIC_DEFAULT_HAIKU_MODEL": "glm-4.7"
          "ANTHROPIC_DEFAULT_SONNET_MODEL": "glm-5.2[1m]"
          "ANTHROPIC_DEFAULT_OPUS_MODEL": "glm-5.2[1m]"
          "CLAUDE_CODE_AUTO_COMPACT_WINDOW": "1000000"
          "CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC": 1
          "API_TIMEOUT_MS": "3000000"
          ANTHROPIC_AUTH_TOKEN: ${{ secrets.GLM_API_KEY }}
          # ===================================================
          TASK_DIR: .ai-tasks/issue-${{ github.event.issue.number }}
        run: |
          npm install -g @anthropic-ai/claude-code
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "ai-fix/issue-${{ github.event.issue.number }}"
          
          # 直接读取生成好的 MD 文件传给 Claude
          claude -p "$(cat $TASK_DIR/ai-coder-prompt.md)" --dangerously-skip-permissions
          
          if [ -z "$(git status --porcelain)" ]; then
            echo "⚠️ 警告: AI 没有修改任何代码文件！"
          else
            echo "✅ 发现代码修改，准备提交"
          fi

      - name: 🚀 Push & Create Pull Request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git add .
          git commit -m "feat: 🤖 Auto-resolved issue #${{ github.event.issue.number }} via Claude Code"
          git push --force origin "ai-fix/issue-${{ github.event.issue.number }}"
          gh pr create \
            --title "[AI Generated] Fixes: ${{ github.event.issue.title }}" \
            --body "关联 Issue: #${{ github.event.issue.number }}" \
            --base main \
            --head "ai-fix/issue-${{ github.event.issue.number }}"