name: 🎯 Auto Merger

on:
  pull_request_review:
    types: [submitted]

jobs:
  auto_merge:
    # 只有 AI 提的 PR 且状态是 approved 时触发
    if: startsWith(github.event.pull_request.head.ref, 'ai-fix/issue-') && github.event.review.state == 'approved'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write
      issues: write

    steps:
      - name: 🔄 Enable Auto-Merge (Squash)
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          # 去掉 --auto，执行立刻合并并删除分支
          gh pr merge $PR_NUMBER --squash --delete-branch

      - name: 🏁 Close Related Issue
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          BRANCH_NAME="${{ github.event.pull_request.head.ref }}"
          # 👇【微调】：使用更通用、更安全的 ERE 正则提取数字，与前面工作流保持一致
          ISSUE_NUMBER=$(echo "$BRANCH_NAME" | grep -oiE 'issue-[0-9]+' | grep -oiE '[0-9]+' | head -n 1)
          
          if [ -n "$ISSUE_NUMBER" ]; then
            gh pr comment ${{ github.event.pull_request.number }} --body "✅ 代码已合入主分支。"
            gh issue close $ISSUE_NUMBER --comment "🤖 本问题已通过自动化流水线解决并合并。"
          fi