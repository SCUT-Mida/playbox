name: 🤖 OpenCode Auto Dev (ULW Loop)

on:
  issues:
    types: [labeled]

jobs:
  run-opencode:
    # 只有打上 "ai-task" 标签才触发
    if: github.event.label.name == 'ai-task'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 🥖 Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: 📦 Install OpenCode & oh-my-opencode
        run: |
          # 1. 安装 OpenCode 本体
          pip install opencode-ai --upgrade
          
          # 2. 核心！使用官方推荐命令 + 跳过交互式 UI 的参数安装插件
          bunx oh-my-openagent install
          
          # 3. 防覆盖保险：强制将仓库里的自定义配置覆盖为最高优先级
          # （以防 install 步骤用默认配置覆盖了你的私有模型配置）
          if [ -f ".opencode/oh-my-opencode.json" ]; then
            cp -f .opencode/oh-my-opencode.json ./oh-my-opencode.json
          fi

      - name: 💡 Comment on Issue (通知开始)
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🚀 **OpenCode 已接管任务**！\n\n检测到复杂任务，已成功安装 \`oh-my-opencode\` 并启动 \`/ulw-loop\` 模式。多 Agent 正在分析中，请耐心等候...`
            });

      - name: 🛠️ Execute OpenCode ULW Loop
        env:
          # 注入你的 API，配合 config.toml 中定义的路由规则生效
          OPENAI_API_KEY: ${{ secrets.GLM_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.GLM_BASE_URL }}
        run: |
          # 提取 Issue 信息
          ISSUE_TITLE="${{ github.event.issue.title }}"
          ISSUE_BODY="${{ github.event.issue.body }}"
          
          # 构造 Prompt
          PROMPT="/ulw-loop 请解决这个 GitHub Issue。标题: $ISSUE_TITLE. 详细内容: $ISSUE_BODY. 请直接修改代码，不要做过多的解释。"
          
          # 配置 Git 身份
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 创建新分支
          git checkout -b "ai-fix/issue-${{ github.event.issue.number }}"
          
          # 运行 opencode
          opencode run "$PROMPT" --auto-apply --no-interaction

      - name: 🚀 Push & Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "feat: 🤖 Auto-resolved issue #${{ github.event.issue.number }} via ULW-Loop"
          branch: "ai-fix/issue-${{ github.event.issue.number }}"
          title: "[AI Generated] Fixes: ${{ github.event.issue.title }}"
          body: |
            ### 🤖 由 OpenCode + oh-my-opencode (/ulw-loop) 自动生成
            关联 Issue: #${{ github.event.issue.number }}
