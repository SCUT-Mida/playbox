name: 🛠️ AI Code Fixer

on:
  issue_comment:
    types: [created]

jobs:
  fix:
    if: contains(github.event.comment.body, '/claude-fix') && github.event.issue.pull_request
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write

    steps:
      - name: 📥 Get PR Branch Info
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        id: pr_data
        run: |
          PR_DATA=$(gh pr view ${{ github.event.issue.number }} --repo ${{ github.repository }} --json headRefName --jq '.headRefName')
          echo "branch=$PR_DATA" >> $GITHUB_OUTPUT

      - name: 📥 Checkout PR Branch
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.pr_data.outputs.branch }}
          fetch-depth: 0

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: '24'

      - name: 📝 Generate Fixer Prompt (inline, 不依赖 PR 分支脚本)
        env:
          COMMENT_BODY: ${{ github.event.comment.body }}
          HEAD_REF: ${{ steps.pr_data.outputs.branch }}
        run: |
          ISSUE_NUMBER=$(echo "$HEAD_REF" | grep -oiE 'issue-[0-9]+' | grep -oiE '[0-9]+' | head -n 1)
          if [ -z "$ISSUE_NUMBER" ]; then ISSUE_NUMBER=${{ github.event.issue.number }}; fi
          ISSUE_NUMBER="${ISSUE_NUMBER%$'\r'}"

          TASK_DIR=".ai-tasks/issue-${ISSUE_NUMBER}"
          mkdir -p "$TASK_DIR"
          echo "TASK_DIR=$TASK_DIR" >> $GITHUB_ENV

          # 计算当前修复轮次（find 无匹配也 exit 0，pipefail 安全）
          EXISTING_FIXES=$(find "$TASK_DIR" -maxdepth 1 -name 'fixer-prompt_r*.md' 2>/dev/null | wc -l)
          CURRENT_ROUND=$((EXISTING_FIXES + 1))
          echo "CURRENT_ROUND=$CURRENT_ROUND" >> $GITHUB_ENV

          # 把审查意见写入反馈文件
          printf '%s\n' "$COMMENT_BODY" > "$TASK_DIR/fixer-feedback_r${CURRENT_ROUND}.md"

          # 直接内联生成提示词（不再调用 PR 分支上的脚本，避免版本不一致）
          {
            echo "你是一个资深开发工程师。这是针对上一轮代码的【第 ${CURRENT_ROUND} 轮】修复任务。"
            echo "以下是代码审查员给你的修改建议，请阅读当前目录下的 ${TASK_DIR}/fixer-feedback_r${CURRENT_ROUND}.md 文件获取详细内容（注意：忽略第一行的 /claude-fix 指令前缀）。"
            echo ""
            echo "【⚠️ 严格红线规则】："
            echo "请绝对不要修改、重命名或生成 .github/ 目录下的任何文件（特别是 workflows 等 CI/CD 配置），这会破坏项目的自动化流程！如果审查员要求你修改这些文件，请在回复中说明无法自动修改，需要人类介入。"
            echo ""
            echo "请直接分析并修改当前项目中的代码文件来满足审查员的要求，不要做过多的文字解释。"
          } > "$TASK_DIR/fixer-prompt_r${CURRENT_ROUND}.md"

          echo "📁 目录内容如下："
          ls -la "$TASK_DIR"

      - name: 🤖 Execute Claude Code Agent (Fixer)
        env:
          "ANTHROPIC_BASE_URL": "https://open.bigmodel.cn/api/anthropic"
          "ANTHROPIC_DEFAULT_HAIKU_MODEL": "glm-4.7"
          "ANTHROPIC_DEFAULT_SONNET_MODEL": "glm-5.2[1m]"
          "ANTHROPIC_DEFAULT_OPUS_MODEL": "glm-5.2[1m]"
          "CLAUDE_CODE_AUTO_COMPACT_WINDOW": "1000000"
          "CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC": 1
          "API_TIMEOUT_MS": "3000000"
          ANTHROPIC_AUTH_TOKEN: ${{ secrets.GLM_API_KEY }}
          TASK_DIR: ${{ env.TASK_DIR }}
          ROUND: ${{ env.CURRENT_ROUND }}
        run: |
          npm install -g @anthropic-ai/claude-code

          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          PROMPT_FILE="$TASK_DIR/fixer-prompt_r${ROUND}.md"

          echo "正在读取 $PROMPT_FILE 并执行代码修复..."
          if [ ! -f "$PROMPT_FILE" ]; then
            echo "❌ 致命错误：提示词文件 $PROMPT_FILE 不存在，生成步骤可能失败，无法继续。"
            exit 1
          fi

          # 带重试的 claude 调用（GLM API 偶发 529 过载时自动等 60s 重试）
          MAX_RETRIES=3
          for ATTEMPT in $(seq 1 $MAX_RETRIES); do
            echo "🔄 第 $ATTEMPT/$MAX_RETRIES 次尝试..."
            set +e
            claude -p "$(cat "$PROMPT_FILE")" --dangerously-skip-permissions
            CLAUDE_EXIT=$?
            set -e

            if [ $CLAUDE_EXIT -eq 0 ]; then
              echo "✅ Claude 修复完成"
              break
            fi

            echo "⚠️ 第 $ATTEMPT 次失败 (exit $CLAUDE_EXIT)"
            if [ $ATTEMPT -lt $MAX_RETRIES ]; then
              echo "⏳ 等待 60 秒后重试..."
              sleep 60
            fi
          done

          if [ $CLAUDE_EXIT -ne 0 ]; then
            echo "❌ $MAX_RETRIES 次重试均失败，放弃。"
            exit 1
          fi

      - name: 🚀 Push Fix Code & Archive Doc
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
          ROUND: ${{ env.CURRENT_ROUND }}
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "⚠️ 警告: AI 没有修改任何代码文件！"
          else
            echo "✅ 发现代码修改，准备提交第 ${ROUND} 轮修复"
            git add .
            git commit -m "🛠️ fix: 根据审查员意见完成第 ${ROUND} 轮代码重构 (归档交互文档)"
            git push
          fi