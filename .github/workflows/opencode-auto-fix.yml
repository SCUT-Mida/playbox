name: 🤖 OpenCode Auto Issue Fix

on:
  issues:
    types: [labeled] # 当 Issue 被打上标签时触发

jobs:
  opencode-task:
    # 只有当打上 "opencode" 标签时才触发，防止误触
    if: github.event.label.name == 'opencode'
    runs-on: ubuntu-latest
    permissions:
      contents: write       # 允许推代码
      pull-requests: write  # 允许创建 PR
      issues: write         # 允许回复 Issue

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 获取完整历史，帮助 AI 更好理解上下文

      - name: 🐍 Setup Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Install OpenCode & oh-my-opencode
        env:
          LLM_API_KEY: ${{ secrets.GLM_API_KEY }}
        run: |
          # 1. 安装基础 OpenCode (假设通过 pip 安装)
          pip install opencode-ai
          
          # 2. 安装 oh-my-opencode 插件
          pip install oh-my-opencode
          
          # 或者根据你的具体仓库地址进行 git clone / npm install
          # git clone https://github.com/your-repo/oh-my-opencode.git ~/.opencode/plugins/oh-my-opencode

      - name: 🕵️ Extract Issue Details
        id: issue_data
        run: |
          echo "title<<EOF" >> $GITHUB_ENV
          echo "${{ github.event.issue.title }}" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV
          echo "body<<EOF" >> $GITHUB_ENV
          echo "${{ github.event.issue.body }}" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: 💡 Notify Issue (Starting Work)
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🚀 **OpenCode 已接管任务**！\n\n正在加载 \`oh-my-opencode\` 插件并分析代码库，预计几分钟后提交 PR，请稍候...`
            })

      - name: 🛠️ Run OpenCode to Modify Code
        env:
          LLM_API_KEY: ${{ secrets.GLM_API_KEY }}
          LLM_BASE_URL: ${{ secrets.GLM_BASE_URL }}
        run: |
          # 拼接 Prompt
          PROMPT="请解决以下 GitHub Issue。要求：1. 修改相关代码文件 2. 如有必要请补充测试用例 3. 确保逻辑正确。\n\nIssue 标题: ${{ env.title }}\nIssue 详情: ${{ env.body }}"
          
          # 执行 opencode 并加载 oh-my-opencode 插件
          # (注：此处的 CLI 参数 --plugin 和 --auto-apply 取决于你的 OpenCode 版本设计)
          opencode run \
            --plugin oh-my-opencode \
            --auto-apply \
            --message "$PROMPT"

      - name: 🚀 Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "feat: 🤖 Auto-fix issue #${{ github.event.issue.number }}"
          branch: "opencode/issue-${{ github.event.issue.number }}"
          title: "[AI Auto-Fix] 解决: ${{ github.event.issue.title }}"
          body: |
            ### 🤖 由 OpenCode (oh-my-opencode) 自动生成
            
            本 PR 旨在解决 Issue #${{ github.event.issue.number }}
            
            **任务内容：**
            ${{ env.body }}
            
            ---
            * 请审查以下代码变更，自动化测试通过后将自动合入。*