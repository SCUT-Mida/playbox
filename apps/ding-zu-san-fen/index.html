<!doctype html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#1a1410" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' fill='%231f1812'/%3E%3Ctext x='16' y='23' font-size='22' text-anchor='middle' fill='%23ead9b6' font-family='serif'%3E%E9%BC%8E%3C/text%3E%3C/svg%3E" />
  <title>鼎足三分 · Three Kingdoms Defense</title>
  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #1a1410;
      overflow: hidden;
      font-family: "PingFang SC", "Microsoft YaHei", "Noto Sans CJK SC", sans-serif;
      -webkit-user-select: none;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    #game-container {
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    canvas {
      touch-action: none;
    }

    /* 推荐竖屏：横屏时给出旋转提示遮罩 */
    #orientation-hint {
      display: none;
      position: fixed;
      inset: 0;
      background: #1a1410;
      color: #e8d9b5;
      z-index: 10;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
    }

    @media (orientation: landscape) {
      #orientation-hint {
        display: flex;
      }
    }
  </style>
</head>

<body>
  <div id="game-container"></div>
  <div id="orientation-hint">
    <div>
      <h1 style="font-size: 30px; margin: 0 0 12px;">📱 请竖屏游玩</h1>
      <p style="font-size: 16px; opacity: 0.85;">《鼎足三分》为竖屏设计，请旋转设备以获得最佳体验。</p>
    </div>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>

</html>
