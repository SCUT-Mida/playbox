name: 🕵️ AI Code Reviewer

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    if: startsWith(github.head_ref, 'ai-fix/issue-')
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: '24'

      - name: 📝 Generate Reviewer Prompt (inline, 不依赖 PR 分支脚本)
        env:
          HEAD_REF: ${{ github.head_ref }}
        run: |
          ISSUE_NUMBER=$(echo "$HEAD_REF" | grep -oiE 'issue-[0-9]+' | grep -oiE '[0-9]+' | head -n 1)
          if [ -z "$ISSUE_NUMBER" ]; then ISSUE_NUMBER=${{ github.event.pull_request.number }}; fi
          ISSUE_NUMBER="${ISSUE_NUMBER%$'\r'}"

          TASK_DIR=".ai-tasks/issue-${ISSUE_NUMBER}"
          mkdir -p "$TASK_DIR"
          echo "TASK_DIR=$TASK_DIR" >> $GITHUB_ENV

          EXISTING_REVIEWS=$(find "$TASK_DIR" -maxdepth 1 -name 'review_result_r*.md' 2>/dev/null | wc -l)
          CURRENT_ROUND=$((EXISTING_REVIEWS + 1))
          echo "CURRENT_ROUND=$CURRENT_ROUND" >> $GITHUB_ENV

          # 生成 diff 文件
          git fetch origin main
          git diff origin/main...HEAD > "$TASK_DIR/pr_diff_r${CURRENT_ROUND}.md"

          # 内联生成提示词（不再调用 PR 分支上的脚本）
          {
            echo "你是一个极其严格、甚至有些刁钻的资深代码审查员。"
            echo "这是代码提交后的【第 ${CURRENT_ROUND} 轮】审查。"
            echo "请阅读当前目录下的 ${TASK_DIR}/pr_diff_r${CURRENT_ROUND}.md 文件，这是本次 PR 的代码变更。"
            echo ""
            echo "请检查是否有 Bug、逻辑错误、安全问题或性能瓶颈。"
            echo "请严格按照以下纯文本格式输出你的审查结果，不要输出其他任何内容："
            echo "DECISION: APPROVE 或 REQUEST_CHANGES"
            echo "COMMENT: 你的详细审查意见 (如果你的意见中涉及需要修改 CI/CD 或 workflows，请告知人类手动处理)"
          } > "$TASK_DIR/ai-reviewer-prompt_r${CURRENT_ROUND}.md"

          echo "📁 提示词已生成，文件大小：$(wc -c < "$TASK_DIR/ai-reviewer-prompt_r${CURRENT_ROUND}.md") bytes"
          echo "📁 diff 文件大小：$(wc -c < "$TASK_DIR/pr_diff_r${CURRENT_ROUND}.md") bytes"

      - name: 🤖 Execute Claude Code Agent (Reviewer)
        env:
          "ANTHROPIC_BASE_URL": "https://open.bigmodel.cn/api/anthropic"
          "ANTHROPIC_DEFAULT_HAIKU_MODEL": "glm-4.7"
          "ANTHROPIC_DEFAULT_SONNET_MODEL": "glm-5.2[1m]"
          "ANTHROPIC_DEFAULT_OPUS_MODEL": "glm-5.2[1m]"
          "CLAUDE_CODE_AUTO_COMPACT_WINDOW": "1000000"
          "CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC": 1
          "API_TIMEOUT_MS": "3000000"
          ANTHROPIC_AUTH_TOKEN: ${{ secrets.GLM_API_KEY }}
          TASK_DIR: ${{ env.TASK_DIR }}
          ROUND: ${{ env.CURRENT_ROUND }}
        run: |
          npm install -g @anthropic-ai/claude-code

          PROMPT_FILE="$TASK_DIR/ai-reviewer-prompt_r${ROUND}.md"
          OUTPUT_FILE="$TASK_DIR/review_result_r${ROUND}.md"

          echo "正在读取 $PROMPT_FILE 并执行审查..."
          if [ ! -f "$PROMPT_FILE" ]; then
            echo "❌ 致命错误：提示词文件 $PROMPT_FILE 不存在。"
            exit 1
          fi

          # 带模型 fallback 的重试：先 GLM-5.2，529 过载时降级 GLM-5-Turbo
          CLAUDE_EXIT=1
          for MODEL in "glm-5.2[1m]" "glm-5-turbo"; do
            export ANTHROPIC_DEFAULT_SONNET_MODEL="$MODEL"
            export ANTHROPIC_DEFAULT_OPUS_MODEL="$MODEL"
            echo "📌 使用模型: $MODEL"

            for ATTEMPT in 1 2; do
              echo "🔄 第 $ATTEMPT/2 次尝试..."
              set +e
              claude -p "$(cat "$PROMPT_FILE")" --dangerously-skip-permissions > "$OUTPUT_FILE" 2>&1
              CLAUDE_EXIT=$?
              set -e

              if [ $CLAUDE_EXIT -eq 0 ]; then
                echo "✅ Claude 审查完成 (model: $MODEL)"
                break 2
              fi

              echo "⚠️ 第 $ATTEMPT 次失败 (exit $CLAUDE_EXIT)，错误："
              cat "$OUTPUT_FILE"
              echo "⏳ 等待 120 秒..."
              sleep 120
            done

            [ $CLAUDE_EXIT -eq 0 ] && break
            echo "🔄 $MODEL 不可用，切换下一个模型..."
          done

          if [ $CLAUDE_EXIT -ne 0 ]; then
            echo "❌ 所有模型和重试均失败，放弃。"
            exit 1
          fi

      - name: ⚙️ Parse Review & Action
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          TASK_DIR: ${{ env.TASK_DIR }}
          ROUND: ${{ env.CURRENT_ROUND }}
        run: |
          RESULT_FILE="$TASK_DIR/review_result_r${ROUND}.md"

          DECISION=$(grep "^DECISION:" "$RESULT_FILE" | awk '{print $2}')
          COMMENT=$(sed -n '/^COMMENT:/,$p' "$RESULT_FILE" | sed 's/^COMMENT://' | tr -d '\r')

          if [ "$DECISION" = "APPROVE" ]; then
            echo "✅ 代码审查通过，批准合并..."
            gh pr review $PR_NUMBER --approve --body "🕵️ AI 审查通过！代码质量优秀。\n\n$COMMENT"
          else
            echo "❌ 代码审查不通过，触发 AI-Fixer..."
            gh pr comment $PR_NUMBER --body "/claude-fix 🛠️ **请立即根据以下审查意见修改代码：** \n\n> 以下是第 $ROUND 轮审查未通过的意见：\n\n$COMMENT"
          fi