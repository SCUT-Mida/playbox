name: 🤖 AI Coder

on:
  issues:
    types: [labeled]

jobs:
  run-claude:
    if: github.event.label.name == 'ai-task'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: '24'

      - name: 💡 Comment on Issue
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🚀 **Claude Code 已接管任务**！\n\n开始分析Issue并准备实现代码，请耐心等候...`
            });

      - name: 📝 Generate Coder Prompt (inline, 不依赖脚本)
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          TASK_DIR=".ai-tasks/issue-${{ github.event.issue.number }}"
          mkdir -p "$TASK_DIR"

          printf '%s\n' "$ISSUE_BODY" > "$TASK_DIR/context.md"

          {
            echo "你是一个资深开发者。请解决以下 GitHub Issue："
            echo "【任务标题】: $ISSUE_TITLE"
            echo "【详细需求】: 请直接阅读当前目录下的 ${TASK_DIR}/context.md 文件获取。"
            echo ""
            echo "【⚠️ 严格红线规则】："
            echo "请绝对不要修改、重命名或生成 .github/ 目录下的任何文件 (特别是 workflows 等 CI/CD 配置)，这会破坏项目的自动化流程！如果觉得有必要修改，请在回复中用文字建议人类去改，绝不要自己动手改。"
            echo ""
            echo "请直接分析并修改项目中的代码文件来解决这个问题，不要做过多的文字解释。"
          } > "$TASK_DIR/ai-coder-prompt.md"

          echo "📁 提示词已生成，大小：$(wc -c < "$TASK_DIR/ai-coder-prompt.md") bytes"

      - name: 🛠️ Execute Claude Code Agent
        env:
          # ===================================================
          "ANTHROPIC_BASE_URL": "https://open.bigmodel.cn/api/anthropic"
          "ANTHROPIC_DEFAULT_HAIKU_MODEL": "glm-4.7"
          "ANTHROPIC_DEFAULT_SONNET_MODEL": "glm-5.2[1m]"
          "ANTHROPIC_DEFAULT_OPUS_MODEL": "glm-5.2[1m]"
          "CLAUDE_CODE_AUTO_COMPACT_WINDOW": "1000000"
          "CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC": 1
          "API_TIMEOUT_MS": "3000000"
          ANTHROPIC_AUTH_TOKEN: ${{ secrets.GLM_API_KEY }}
          # ===================================================
          TASK_DIR: .ai-tasks/issue-${{ github.event.issue.number }}
        run: |
          npm install -g @anthropic-ai/claude-code
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "ai-fix/issue-${{ github.event.issue.number }}"
          
          PROMPT_FILE="$TASK_DIR/ai-coder-prompt.md"
          if [ ! -f "$PROMPT_FILE" ]; then
            echo "❌ 致命错误：提示词文件 $PROMPT_FILE 不存在。"
            exit 1
          fi

          # 带重试的 claude 调用（GLM API 偶发 529 过载时自动等 60s 重试）
          MAX_RETRIES=3
          for ATTEMPT in $(seq 1 $MAX_RETRIES); do
            echo "🔄 第 $ATTEMPT/$MAX_RETRIES 次尝试..."
            set +e
            claude -p "$(cat "$PROMPT_FILE")" --dangerously-skip-permissions
            CLAUDE_EXIT=$?
            set -e

            if [ $CLAUDE_EXIT -eq 0 ]; then
              echo "✅ Claude 实现完成"
              break
            fi
            echo "⚠️ 第 $ATTEMPT 次失败 (exit $CLAUDE_EXIT)"
            if [ $ATTEMPT -lt $MAX_RETRIES ]; then
              echo "⏳ 等待 60 秒后重试..."
              sleep 60
            fi
          done

          if [ $CLAUDE_EXIT -ne 0 ]; then
            echo "❌ $MAX_RETRIES 次重试均失败，放弃。"
            exit 1
          fi

          if [ -z "$(git status --porcelain)" ]; then
            echo "⚠️ 警告: AI 没有修改任何代码文件！"
          else
            echo "✅ 发现代码修改，准备提交"
          fi

      - name: 🚀 Push & Create Pull Request
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          git add .
          git commit -m "feat: 🤖 Auto-resolved issue #${{ github.event.issue.number }} via Claude Code"
          git push --force origin "ai-fix/issue-${{ github.event.issue.number }}"
          gh pr create \
            --title "[AI Generated] Fixes: ${{ github.event.issue.title }}" \
            --body "关联 Issue: #${{ github.event.issue.number }}" \
            --base main \
            --head "ai-fix/issue-${{ github.event.issue.number }}"