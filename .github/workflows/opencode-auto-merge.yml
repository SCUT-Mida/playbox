name: 🤖 Auto Review & Merge

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  auto-merge:
    # 只有分支名以 "ai-fix/" 开头的 PR (也就是上面的 Action 创建的) 才会触发
    if: startsWith(github.head_ref, 'ai-fix/issue-')
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write
      issues: write

    steps:
      - name: ⏳ Wait for CI Tests (等待自动化测试跑完)
        uses: lewagon/wait-on-check-action@v1.3.4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          check-name: 'tests' # 【注意】把 'tests' 换成你仓库里实际跑测试的 Job 名称。如果没测试，这步可删掉。
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          wait-interval: 15

      - name: ✅ Auto Approve PR (自动通过审查)
        uses: hmarr/auto-approve-action@v4
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🔄 Enable Auto-Merge (启用自动合并)
        uses: peter-evans/enable-pull-request-automerge@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          pull-request-number: ${{ github.event.pull_request.number }}
          merge-method: squash # 使用 Squash merge 保持主分支干净

      - name: 🏁 Close Related Issue (关闭原 Issue)
        uses: actions/github-script@v7
        with:
          script: |
            // 提取分支名里的 Issue 编号
            const branchName = context.payload.pull_request.head.ref;
            const issueNumber = branchName.split('-')[2];
            
            if (issueNumber) {
              // 在 PR 中评论
              github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body: `✅ 代码已通过自动化测试并合入主分支。Issue #${issueNumber} 即将关闭。`
              });
            
              // 关闭原 Issue
              github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: parseInt(issueNumber),
                state: 'closed'
              });
            }